<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIMO Guardian - Auto Mesh + Voice Triage</title>

    <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg: #050505; --card: #111; --primary: #00f2ff; --accent: #ff003c; --green: #00ff9d; --orange: #ff9500; --yellow: #ffcc00; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        body[dir="ltr"] { font-family: 'Roboto', sans-serif; }

        .screen { position: absolute; inset: 0; width: 100%; height: 100%; display: flex; flex-direction: column; transition: opacity 0.4s ease; opacity: 0; pointer-events: none; z-index: 0; }
        .screen.active { opacity: 1; pointer-events: auto; z-index: 10; }

        #splash { z-index: 10000; background: #000; align-items: center; justify-content: center; }
        .loader { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }

        #lang-screen { z-index: 9500; background: #050505; align-items: center; justify-content: center; }
        .lang-btn { width: 80%; max-width: 300px; padding: 20px; margin: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px; transition: 0.2s; }
        .lang-btn.ar { border-right: 5px solid var(--green); }
        .lang-btn.en { border-left: 5px solid var(--primary); font-family: 'Roboto', sans-serif; }

        #auth-screen { z-index: 9000; background: #080808; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 1rem; text-align: center; }
        .main-btn { width: 100%; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }

        #app-container { background: #000; align-items: center; justify-content: flex-start; padding-top: 20px; }
        header { width: 100%; padding: 0 25px 20px 25px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 900; color: #fff; letter-spacing: 1px; }

        .status-card { width: 90%; max-width: 400px; padding: 20px; background: #111; border: 1px solid #222; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .grid-data { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .data-item { background: #0a0a0a; padding: 15px 10px; border-radius: 12px; border: 1px solid #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .data-val { font-size: 1.3rem; font-weight: bold; color: var(--primary); font-family: monospace; }
        .data-label { font-size: 0.75rem; color: #666; margin-top: 5px; }

        .mesh-status { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; background: #1a1a1a; }
        .mesh-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .mesh-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .mesh-dot.offline { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
        .mesh-dot.mesh-active { background: var(--primary); box-shadow: 0 0 8px var(--primary); }

        .start-btn { width: 90%; max-width: 400px; padding: 25px; background: var(--primary); color: #000; font-size: 1.6rem; font-weight: 900; border: none; border-radius: 18px; cursor: pointer; box-shadow: 0 0 40px rgba(0, 242, 255, 0.15); transition: 0.3s; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .start-btn.active { background: var(--green); box-shadow: 0 0 40px rgba(0, 255, 157, 0.2); }

        .sim-bar { width: 90%; max-width: 400px; display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; }
        .sim-chip { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 10px 20px; border-radius: 25px; font-size: 0.85rem; white-space: nowrap; cursor: pointer; }

        /* VOICE TRIAGE SCREEN */
        #triage-screen { z-index: 55; background: rgba(5, 5, 5, 0.98); align-items: center; justify-content: center; }
        .triage-box { width: 90%; max-width: 400px; background: #111; border: 2px solid var(--yellow); border-radius: 20px; padding: 30px; text-align: center; }
        .triage-title { color: var(--yellow); font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; }
        .triage-text { color: #fff; font-size: 1.2rem; margin-bottom: 20px; line-height: 1.5; }
        .triage-countdown { font-size: 3rem; font-weight: bold; color: var(--accent); margin: 20px 0; }
        .triage-btns { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .triage-btn { padding: 15px 30px; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; border: none; }
        .triage-btn.ok { background: var(--green); color: #000; }
        .triage-btn.help { background: var(--accent); color: #fff; }

        /* ALERT SCREEN */
        #doctor-screen { z-index: 50; background: rgba(5, 5, 5, 0.98); align-items: center; justify-content: flex-start; padding-top: 60px; }
        .alert-header { width: 100%; padding: 25px; background: var(--accent); color: #fff; text-align: center; font-weight: bold; font-size: 1.4rem; animation: flash 1s infinite; border-bottom: 4px solid #a00; position: absolute; top: 0; left: 0; z-index: 60; }

        .question-box { margin-top: 30px; text-align: center; padding: 20px; }
        .question-text { font-size: 1.4rem; color: var(--primary); margin-bottom: 10px; font-weight: bold; line-height: 1.4; }
        .listening-indicator { font-size: 0.9rem; color: #aaa; animation: pulse 1s infinite; display: none; }

        .countdown-circle { margin-top: 20px; width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--accent); background: #000; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; color: #fff; box-shadow: 0 0 30px var(--accent); }

        #txt-assurance { margin-top: 20px; color: var(--green); font-size: 1.1rem; text-align: center; display: none; animation: flash 2s infinite; padding: 15px; border: 1px solid var(--green); border-radius: 10px; background: rgba(0, 255, 157, 0.1); width: 90%; }

        .cancel-btn-center { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #222; border: 2px solid #444; color: #fff; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1rem; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; gap: 10px; }

        .widget-area { width: 100%; height: 40%; background: transparent; position: relative; margin-top: 20px; display: none; border-top: 1px solid #333; }
        elevenlabs-convai { width: 100%; height: 100%; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color:#fff; padding: 10px 25px; border-radius: 30px; font-size: 0.9rem; opacity: 0; transition: 0.3s; z-index: 20000; pointer-events: none; border: 1px solid #444; }
        .warning-border { border-color: var(--accent) !important; animation: flash 0.5s infinite; }

        .audio-viz { display: flex; align-items: flex-end; gap: 2px; height: 30px; margin-top: 10px; justify-content: center; }
        .audio-bar { width: 4px; background: var(--primary); border-radius: 2px; transition: height 0.1s; }

        .mesh-devices-list { width: 90%; max-width: 400px; max-height: 100px; overflow-y: auto; background: #0a0a0a; border-radius: 10px; padding: 10px; margin-top: 10px; }
        .mesh-device-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; border-bottom: 1px solid #1a1a1a; font-size: 0.8rem; }
        .mesh-device-item:last-child { border-bottom: none; }
        .mesh-device-status { color: var(--green); font-size: 0.7rem; }
        .mesh-device-status.offline { color: #666; }

        @keyframes spin { 100% { transform: rotate(-360deg); } }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

        <div class="loader"></div>
    </div>

        <div class="mesh-devices-list" id="mesh-list" style="display:none;">

            <div id="mesh-devices-container"></div>
        </div>
    </div>

        <div class="countdown-circle" id="countdown-display">10</div>
        <div class="widget-area" id="ai-container"></div>

            <i class="fas fa-times-circle"></i> <span id="txt-cancel-btn">--</span>
        </button>

    <div id="toast"></div>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            WEBHOOK_URL: "https://hook.eu1.make.com/booixboep6okeq0ypcgrbihbtq45emg7", 
            AGENT_IDS: { ar: "agent_5601kfrvwrrxfxgafkezx421fe01", en: "agent_5601kfrvwrrxfxgafkezx421fe01" },
            FALL: {
                FREEFALL_THRESHOLD: 2.5, FREEFALL_TIMEOUT: 800, IMPACT_THRESHOLD: 15.0,
                IMPACT_CANCEL_THRESHOLD: 8.0, SILENCE_DURATION: 2500, SILENCE_THRESHOLD: 3.0,
                SILENCE_SAMPLE_COUNT: 10, GYRO_FALL_THRESHOLD: 60
            },
            AUDIO: { SCREAM_THRESHOLD: 85, SAMPLE_RATE: 44100, FFT_SIZE: 2048, SCREAM_FREQ_MIN: 1000, SCREAM_FREQ_MAX: 3000 },
            BATTERY: { CRITICAL: 0.05, LOW: 0.15, CHECK_INTERVAL: 30000 },
            MESH: {
                SERVICE_UUID: '0000180a-0000-1000-8000-00805f9b34fb',
                ALERT_UUID: '00002a01-0000-1000-8000-00805f9b34fb',
                SCAN_TIMEOUT: 15000, RETRY_INTERVAL: 5000, MIMO_PREFIX: 'MIMO_'
            },
            TRIAGE: { TIMEOUT: 5000, CANCEL_WORDS_AR: ['بخير', 'تمام', 'لا شيء', 'إلغاء', 'cancel', 'ok', 'fine', 'good', 'safe'] },
            TEXT: {
                ar: {
                    login_title: "إعدادات الطوارئ", user_ph: "اسمك", email_ph: "البريد الإلكتروني (لتلقي الإنذار)", 
                    auth_note: "* سيتم إرسال تقرير الطوارئ اللحظي إلى هذا الإيميل", login_btn: "حفظ وبدء النظام",
                    live_sensors: "المؤشرات الحيوية", voice_label: "تحليل الاستغاثة الصوتي", voice_inactive: "غير نشط",

                    assurance_speak: "تم إبلاغ الطوارئ بحالتك عبر البريد. المساعدة في الطريق. أنا المسعف الآلي، يمكنك سؤالي عن الإسعافات الأولية.",

                    battery_critical: "⚠️ بطارية حرجة! إرسال إنذار مبكر", battery_low: "🔋 بطارية منخفضة",
                    gyro_label: "الاتجاه", battery_label: "البطارية", audio_label: "مستوى الصوت",

                    ai_ask: "Are you okay?.. Press Cancel if safe.. Or tell me where it hurts immediately.",
                    listening: "Recording your response...",
                    assurance_msg: "Alert Sent. Help is coming. Talk to AI Medic below 👇",

        // ==================== SERVICE WORKER ====================
        const swManager = {
            registration: null,
            init: async () => {
                if ('serviceWorker' in navigator) {
                    try {
                        const swCode = \`
                            const CACHE_NAME = 'mimo-guardian-v2';
                            self.addEventListener('install', e => { self.skipWaiting(); });
                            self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
                            self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => new Response('Offline'))); });
                            self.addEventListener('sync', e => {
                                if (e.tag === 'send-alert') e.waitUntil(sendPendingAlerts());
                            });
                            async function sendPendingAlerts() {
                                const db = await openDB('mimo-db', 1);
                                const alerts = await db.getAll('pending-alerts');
                                for (const alert of alerts) {
                                    try {
                                        await fetch(alert.url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(alert.data) });
                                        await db.delete('pending-alerts', alert.id);
                                    } catch(e) { break; }
                                }
                            }
                            function openDB(name, version) {
                                return new Promise((resolve, reject) => {
                                    const req = indexedDB.open(name, version);
                                    req.onerror = () => reject(req.error);
                                    req.onsuccess = () => resolve({
                                        getAll: (store) => new Promise((res) => {
                                            const data = [];
                                            req.result.transaction(store, 'readonly').objectStore(store).openCursor().onsuccess = (e) => {
                                                const c = e.target.result;
                                                if (c) { data.push(c.value); c.continue(); } else res(data);
                                            };
                                        }),
                                        delete: (store, id) => new Promise((res) => {
                                            req.result.transaction(store, 'readwrite').objectStore(store).delete(id).onsuccess = () => res();
                                        })
                                    });
                                    req.onupgradeneeded = (e) => {
                                        const db = e.target.result;
                                        if (!db.objectStoreNames.contains('pending-alerts')) db.createObjectStore('pending-alerts', { keyPath: 'id', autoIncrement: true });
                                        if (!db.objectStoreNames.contains('mesh-devices')) db.createObjectStore('mesh-devices', { keyPath: 'deviceId' });
                                    };
                                });
                            }
                        \`;
                        const blob = new Blob([swCode], { type: 'application/javascript' });
                        swManager.registration = await navigator.serviceWorker.register(URL.createObjectURL(blob));
                        if ('Notification' in window) await Notification.requestPermission();
                    } catch(e) { console.log('SW not available:', e); }
                }
            }
        };

        // ==================== INDEXEDDB ====================
        const dbManager = {
            db: null,
            init: async () => {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('mimo-db', 1);
                    req.onerror = () => reject(req.error);
                    req.onsuccess = () => { dbManager.db = req.result; resolve(); };
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('pending-alerts')) db.createObjectStore('pending-alerts', { keyPath: 'id', autoIncrement: true });
                        if (!db.objectStoreNames.contains('mesh-devices')) db.createObjectStore('mesh-devices', { keyPath: 'deviceId' });
                        if (!db.objectStoreNames.contains('sensor-logs')) db.createObjectStore('sensor-logs', { keyPath: 'id', autoIncrement: true });
                    };
                });
            },
            saveAlert: async (data) => {
                if (!dbManager.db) return;
                const tx = dbManager.db.transaction('pending-alerts', 'readwrite');
                await tx.objectStore('pending-alerts').add({ data, timestamp: Date.now(), url: CONFIG.WEBHOOK_URL });
            },
            saveMeshDevice: async (device) => {
                if (!dbManager.db) return;
                const tx = dbManager.db.transaction('mesh-devices', 'readwrite');
                await tx.objectStore('mesh-devices').put({ ...device, lastSeen: Date.now() });
            },
            getMeshDevices: async () => {
                if (!dbManager.db) return [];
                return new Promise((resolve) => {
                    const tx = dbManager.db.transaction('mesh-devices', 'readonly');
                    const data = [];
                    tx.objectStore('mesh-devices').openCursor().onsuccess = (e) => {
                        const c = e.target.result;
                        if (c) { data.push(c.value); c.continue(); } else resolve(data);
                    };
                });
            }
        };

        // ==================== WAKE LOCK ====================
        const wakeLockManager = {
            lock: null,
            request: async () => {
                if ('wakeLock' in navigator) {
                    try {
                        wakeLockManager.lock = await navigator.wakeLock.request('screen');
                        wakeLockManager.lock.addEventListener('release', () => wakeLockManager.request());
                    } catch(e) {}
                }
            },
            release: () => { if (wakeLockManager.lock) { wakeLockManager.lock.release(); wakeLockManager.lock = null; } }
        };

        // ==================== BATTERY MONITOR ====================
        const batteryManager = {
            battery: null,
            init: async () => {
                if ('getBattery' in navigator) {
                    batteryManager.battery = await navigator.getBattery();
                    batteryManager.updateUI();
                    batteryManager.battery.addEventListener('levelchange', batteryManager.updateUI);
                    batteryManager.battery.addEventListener('chargingchange', batteryManager.updateUI);
                    setInterval(batteryManager.checkCritical, CONFIG.BATTERY.CHECK_INTERVAL);
                }
            },
            updateUI: () => {
                if (!batteryManager.battery) return;
                const level = Math.round(batteryManager.battery.level * 100);
                const el = document.getElementById('val-battery');
                el.innerText = level + '%' + (batteryManager.battery.charging ? ' ⚡' : '');
                el.style.color = level < 20 ? 'var(--accent)' : (level < 50 ? 'var(--orange)' : 'var(--green)');
            },
            checkCritical: () => {
                if (!batteryManager.battery) return;
                const level = batteryManager.battery.level;
                if (level <= CONFIG.BATTERY.CRITICAL) {
                    ui.toast(CONFIG.TEXT[app.lang].battery_critical);
                    core.triggerAlarm(app.lang === 'ar' ? 'بطارية حرجة' : 'Critical Battery');
                } else if (level <= CONFIG.BATTERY.LOW) ui.toast(CONFIG.TEXT[app.lang].battery_low);
            }
        };

        // ==================== GYROSCOPE ====================
        const gyroManager = {
            lastBeta: 0, lastGamma: 0,
            init: () => { if (window.DeviceOrientationEvent) window.addEventListener('deviceorientation', gyroManager.handleOrientation); },
            handleOrientation: (e) => {
                const beta = e.beta || 0, gamma = e.gamma || 0;
                const deltaBeta = Math.abs(beta - gyroManager.lastBeta);
                const deltaGamma = Math.abs(gamma - gyroManager.lastGamma);
                const totalDelta = Math.sqrt(deltaBeta**2 + deltaGamma**2);
                gyroManager.lastBeta = beta; gyroManager.lastGamma = gamma;
                document.getElementById('val-gyro').innerText = Math.round(beta) + '°';
                core.gyroData = { beta, gamma, delta: totalDelta, timestamp: Date.now() };
            }
        };

        // ==================== WEB AUDIO API ====================
        const audioManager = {
            context: null, analyser: null, microphone: null, dataArray: null, isListening: false,
            init: async () => {
                try {
                    audioManager.context = new (window.AudioContext || window.webkitAudioContext)();
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioManager.microphone = audioManager.context.createMediaStreamSource(stream);
                    audioManager.analyser = audioManager.context.createAnalyser();
                    audioManager.analyser.fftSize = CONFIG.AUDIO.FFT_SIZE;
                    audioManager.microphone.connect(audioManager.analyser);
                    audioManager.dataArray = new Uint8Array(audioManager.analyser.frequencyBinCount);
                    audioManager.isListening = true;
                    audioManager.visualize();
                    audioManager.detectScream();
                } catch(e) {}
            },
            visualize: () => {
                if (!audioManager.isListening) return;
                audioManager.analyser.getByteFrequencyData(audioManager.dataArray);
                const container = document.getElementById('audio-viz');
                if (container.children.length === 0) for (let i = 0; i < 20; i++) { const bar = document.createElement('div'); bar.className = 'audio-bar'; bar.style.height = '4px'; container.appendChild(bar); }
                const bars = container.children;
                for (let i = 0; i < bars.length; i++) {
                    const value = audioManager.dataArray[i * 5] || 0;
                    bars[i].style.height = Math.max(4, (value / 255) * 30) + 'px';
                    bars[i].style.background = value > 200 ? 'var(--accent)' : 'var(--primary)';
                }
                requestAnimationFrame(audioManager.visualize);
            },
            detectScream: () => {
                if (!audioManager.isListening) return;
                audioManager.analyser.getByteFrequencyData(audioManager.dataArray);
                const binWidth = audioManager.context.sampleRate / 2 / audioManager.analyser.frequencyBinCount;
                const minBin = Math.floor(CONFIG.AUDIO.SCREAM_FREQ_MIN / binWidth);
                const maxBin = Math.floor(CONFIG.AUDIO.SCREAM_FREQ_MAX / binWidth);
                let sum = 0;
                for (let i = minBin; i < maxBin && i < audioManager.dataArray.length; i++) sum += audioManager.dataArray[i];
                const avg = sum / (maxBin - minBin);
                core.audioLevel = { avg: Math.round(avg), timestamp: Date.now() };
                if (avg > 180 && core.active) core.triggerAlarm(app.lang === 'ar' ? 'صراخ مكتشف' : 'Scream Detected');
                setTimeout(audioManager.detectScream, 500);
            }
        };

        // ==================== BLUETOOTH MESH MANAGER (AUTO-DISCOVERY) ====================
        const meshManager = {
            scan: null, connectedDevices: [], discoveredDevices: [], isScanning: false,
            isSupported: () => 'bluetooth' in navigator,
            updateUI: () => {
                const dot = document.getElementById('mesh-dot');
                const text = document.getElementById('mesh-text');
                const wifi = document.getElementById('wifi-icon');
                const t = CONFIG.TEXT[app.lang];

                else if (networkManager.isOnline) { dot.className = 'mesh-dot active'; text.innerText = t.mesh_online; wifi.style.color = 'var(--green)'; }
                else { dot.className = 'mesh-dot offline'; text.innerText = t.mesh_offline; wifi.style.color = 'var(--accent)'; }
            },

            // ✅ تحسين 1: Auto Scan باستخدام requestLEScan (اكتشاف كل الأجهزة القريبة)
            startAutoScan: async () => {
                if (!meshManager.isSupported()) { ui.toast(app.lang === 'ar' ? 'Bluetooth غير مدعوم' : 'Bluetooth not supported'); return; }
                if (meshManager.isScanning) return;

                const t = CONFIG.TEXT[app.lang];
                ui.toast(t.mesh_scanning);
                meshManager.isScanning = true;
                document.getElementById('btn-scan-mesh').style.borderColor = 'var(--accent)';

                try {
                    // الطريقة 1: requestLEScan (Chrome 86+ تجريبي - يسمح بفحص كل الأجهزة)
                    if ('requestLEScan' in navigator.bluetooth) {
                        meshManager.scan = await navigator.bluetooth.requestLEScan({
                            acceptAllAdvertisements: true
                        });

                        navigator.bluetooth.addEventListener('advertisementreceived', meshManager.onAdvertisement);

                        setTimeout(() => {
                            if (meshManager.scan) { meshManager.scan.stop(); meshManager.scan = null; }
                            meshManager.isScanning = false;
                            document.getElementById('btn-scan-mesh').style.borderColor = 'var(--primary)';
                            meshManager.updateUI();
                        }, CONFIG.MESH.SCAN_TIMEOUT);

                    } else {
                        // الطريقة 2: Fallback - requestDevice لاكتشاف جهاز واحد على الأقل
                        const device = await navigator.bluetooth.requestDevice({
                            acceptAllDevices: true,
                            optionalServices: [CONFIG.MESH.SERVICE_UUID]
                        });
                        await meshManager.connectDevice(device);
                        meshManager.isScanning = false;
                        document.getElementById('btn-scan-mesh').style.borderColor = 'var(--primary)';
                    }
                } catch(e) {
                    console.log('Scan error:', e);
                    meshManager.isScanning = false;
                    document.getElementById('btn-scan-mesh').style.borderColor = 'var(--primary)';
                }
            },

            onAdvertisement: async (event) => {
                const device = event.device;
                const name = device.name || 'Unknown';

                // فلترة: نهتم فقط بأجهزة MIMO أو كل الأجهزة القريبة
                if (name.startsWith(CONFIG.MESH.MIMO_PREFIX) || event.rssi > -70) {
                    if (!meshManager.discoveredDevices.find(d => d.id === device.id)) {
                        meshManager.discoveredDevices.push({
                            id: device.id, name: name, rssi: event.rssi, lastSeen: Date.now()
                        });

                        // حفظ في IndexedDB
                        await dbManager.saveMeshDevice({ deviceId: device.id, name: name });

                        // محاولة الاتصال تلقائياً
                        await meshManager.connectDevice(device);

                        meshManager.updateMeshList();
                    }
                }
            },

            connectDevice: async (device) => {
                try {
                    device.addEventListener('gattserverdisconnected', () => meshManager.onDisconnected(device));
                    const server = await device.gatt.connect();

                    // محاولة الحصول على الخدمة والخصائص
                    let service, alertChar;
                    try {
                        service = await server.getPrimaryService(CONFIG.MESH.SERVICE_UUID);
                        alertChar = await service.getCharacteristic(CONFIG.MESH.ALERT_UUID);
                    } catch(e) {
                        // إذا لم تتوفر الخدمة المحددة، جرب أي خدمة متاحة
                        const services = await server.getPrimaryServices();
                        if (services.length > 0) {
                            const chars = await services[0].getCharacteristics();
                            if (chars.length > 0) alertChar = chars[0];
                        }
                    }

                    if (alertChar) {
                        meshManager.connectedDevices.push({
                            device: device, server: server, characteristic: alertChar, id: device.id, name: device.name
                        });

                        // بدء الاستماع للإنذارات الواردة من هذا الجهاز
                        await alertChar.startNotifications();
                        alertChar.addEventListener('characteristicvaluechanged', meshManager.onMeshAlert);

                        ui.toast((app.lang === 'ar' ? 'متصل بـ: ' : 'Connected to: ') + (device.name || 'Mesh Device'));
                    }

                    meshManager.updateUI();
                    meshManager.updateMeshList();

                } catch(e) { console.log('Connect error:', e); }
            },

            onDisconnected: (device) => {
                meshManager.connectedDevices = meshManager.connectedDevices.filter(d => d.id !== device.id);
                meshManager.updateUI();
                meshManager.updateMeshList();
                // إعادة المحاولة بعد فترة
                setTimeout(() => meshManager.connectDevice(device).catch(() => {}), CONFIG.MESH.RETRY_INTERVAL);
            },

            onMeshAlert: (event) => {
                const value = event.target.value;
                const decoder = new TextDecoder('utf-8');
                const alertData = decoder.decode(value);
                try {
                    const alert = JSON.parse(alertData);
                    ui.toast(`🚨 Mesh: ${alert.user || 'Unknown'} - ${alert.reason}`);
                    // إعادة توجيه للWebhook إذا كان متصلاً
                    if (networkManager.isOnline) {
                        fetch(CONFIG.WEBHOOK_URL, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ...alert, relayed_by: app.user, relay_method: 'bluetooth_mesh' })
                        }).catch(() => {});
                    }
                } catch(e) { ui.toast('Mesh Alert: ' + alertData); }
            },

            broadcastAlert: async (alertData) => {

                const data = encoder.encode(JSON.stringify(alertData));
                let sentCount = 0;

                for (const conn of meshManager.connectedDevices) {
                    try {
                        if (conn.characteristic && conn.device.gatt.connected) {
                            await conn.characteristic.writeValue(data);
                            sentCount++;
                        }
                    } catch(e) { console.log('Broadcast fail for device:', conn.id); }
                }

                return sentCount;
            },

            updateMeshList: () => {

                    container.appendChild(div);

        // ==================== VOICE TRIAGE MANAGER ====================
        const triageManager = {
            timer: null, active: false, detectedWord: '',

            // ✅ تحسين 3: عند سماع كلمة استغاثة → بدء Triage (عد تنازلي + سؤال)
            start: (word) => {
                if (triageManager.active) return;
                triageManager.active = true;
                triageManager.detectedWord = word;

                const t = CONFIG.TEXT[app.lang];
                document.getElementById('txt-triage-title').innerText = t.triage_title;
                document.getElementById('txt-triage-text').innerText = t.triage_text.replace('{word}', word);
                document.getElementById('btn-triage-ok').innerText = t.triage_ok;
                document.getElementById('btn-triage-help').innerText = t.triage_help;

                app.showScreen('triage-screen');

                // نطق السؤال صوتياً
                core.speakText(t.triage_text.replace('{word}', word));

                let count = 5;
                const countEl = document.getElementById('triage-countdown');
                countEl.innerText = count;

                triageManager.timer = setInterval(() => {
                    count--;
                    countEl.innerText = count;
                    if (count <= 0) {
                        triageManager.finish('timeout');
                    }
                }, 1000);

                // الاستماع للرد الصوتي أثناء العد التنازلي
                triageManager.listenForResponse();
            },

            listenForResponse: () => {
                // إعداد معالج مؤقت لنتائج التعرف على الصوت
                triageManager.voiceHandler = (transcript) => {
                    const lower = transcript.toLowerCase();
                    const t = CONFIG.TEXT[app.lang];
                    const cancelWords = CONFIG.TRIAGE.CANCEL_WORDS_AR.concat(
                        app.lang === 'ar' ? ['بخير', 'تمام', 'لا شيء', 'إلغاء'] : ['ok', 'fine', 'good', 'cancel', 'safe']
                    );

                    // التحقق من كلمات الإلغاء
                    for (const word of cancelWords) {
                        if (lower.includes(word.toLowerCase())) {
                            triageManager.finish('cancelled');
                            return;
                        }
                    }

                    // التحقق من كلمات التأكيد
                    const helpWords = app.lang === 'ar' ? ['مساعدة', 'ألم', 'مصاب', 'سيء'] : ['help', 'pain', 'hurt', 'bad'];
                    for (const word of helpWords) {
                        if (lower.includes(word.toLowerCase())) {
                            triageManager.finish('confirmed');
                            return;
                        }
                    }
                };
            },

            respond: (response) => {
                triageManager.finish(response === 'ok' ? 'cancelled' : 'confirmed');
            },

            finish: (result) => {
                clearInterval(triageManager.timer);
                triageManager.active = false;
                triageManager.voiceHandler = null;

                const t = CONFIG.TEXT[app.lang];

                if (result === 'cancelled') {
                    core.speakText(t.triage_cancel_speak);
                    ui.toast(app.lang === 'ar' ? '✅ تم الإلغاء' : '✅ Cancelled');
                    app.showScreen('app-container');
                } else {
                    // timeout أو confirmed → تفعيل الإنذار
                    if (result === 'timeout') core.speakText(t.triage_timeout);
                    setTimeout(() => {
                        core.triggerAlarm(triageManager.detectedWord + (result === 'timeout' ? ' (No Response)' : ' (Confirmed)'));
                    }, 1000);
                }
            },

            voiceHandler: null
        };

        // ==================== CORE SYSTEM ====================
        const core = {
            active: false, recognition: null, countdownTimer: null,

                            if (!core.isRecordingResponse) {
                                document.getElementById('voice-txt').innerText = `"${transcript.split(' ').pop()}"`;

                                // ✅ تحسين 5: الكلمات المفتاحية تُفعل Triage (وليس الإنذار الفوري)
                                CONFIG.TEXT[app.lang].triggers.forEach(word => {

                                        triageManager.start(word); 
                                    }
                                });
                            } else {
                                const latest = event.results[event.results.length - 1][0].transcript;
                                core.patientResponse = latest; 
                                document.getElementById('txt-ai-question').innerText = `"${latest}"`; 
                            }
                        };
                        core.recognition.onend = () => { if(core.active || core.isRecordingResponse) core.recognition.start(); };
                        core.recognition.start();
                    }

                    if (window.DeviceMotionEvent) window.addEventListener('devicemotion', core.handleMotion);
                    document.getElementById('val-status').innerText = CONFIG.TEXT[app.lang].secure;
                    document.getElementById('val-status').style.color = "var(--green)";
                    core.active = true;
                    ui.btnUpdate(true);

                    if ('Notification' in window && Notification.permission === 'granted') {
                        new Notification('MIMO Guardian', { body: app.lang === 'ar' ? 'الحماية مفعلة' : 'Guard Active' });
                    }
                } catch(e) { alert("Permissions Required"); }
            },

            stop: () => {
                core.active = false; core.isRecordingResponse = false; ui.btnUpdate(false);
                if(core.recognition) core.recognition.abort();
                window.removeEventListener('devicemotion', core.handleMotion);
                window.removeEventListener('deviceorientation', gyroManager.handleOrientation);
                document.getElementById('voice-txt').innerText = CONFIG.TEXT[app.lang].voice_inactive;
                audioManager.isListening = false;
                wakeLockManager.release();
            },

            handleMotion: (e) => {
                if(!core.active) return;
                const acc = e.acceleration; 
                if (!acc) {
                    const accG = e.accelerationIncludingGravity;
                    if (!accG) return;
                    const totalG = Math.sqrt(accG.x**2 + accG.y**2 + accG.z**2);
                    core.processMotionData(Math.max(0, totalG - 9.8), e);
                    return;
                }
                core.processMotionData(Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2), e);
            },

            processMotionData: (total, e) => {
                const now = Date.now();
                const state = core.fallState;
                const cfg = CONFIG.FALL;
                const gForce = (total / 9.8).toFixed(2);
                document.getElementById('val-mov').innerText = gForce;
                state.history.push({ total, time: now });
                if (state.history.length > 50) state.history.shift();
                if (total > 100) return;

                const gyroConfirmed = core.gyroData && (now - core.gyroData.timestamp < 500) && core.gyroData.delta > cfg.GYRO_FALL_THRESHOLD;

                if (state.phase === 'idle' && total < cfg.FREEFALL_THRESHOLD) { 
                    state.phase = 'freefall'; state.timestamp = now; state.maxImpact = 0; state.silenceSamples = 0;
                }
                else if (state.phase === 'freefall') {
                    if (now - state.timestamp > cfg.FREEFALL_TIMEOUT) state.phase = 'idle';
                    else if (total > cfg.IMPACT_THRESHOLD) { state.phase = 'impact'; state.timestamp = now; state.maxImpact = total; state.silenceSamples = 0; }
                }
                else if (state.phase === 'impact') {
                    if (total > state.maxImpact) state.maxImpact = total;
                    if (total < cfg.SILENCE_THRESHOLD) state.silenceSamples++;
                    else state.silenceSamples = 0;

                    const confirmed = state.silenceSamples >= cfg.SILENCE_SAMPLE_COUNT;
                    const gyroFall = gyroConfirmed || !core.gyroData;

                    if (confirmed && gyroFall) {
                        state.phase = 'idle';
                        core.triggerAlarm(app.lang==='ar' ? `سقوط مؤكد (${state.maxImpact.toFixed(1)}m/s²)` : `Confirmed Fall (${state.maxImpact.toFixed(1)}m/s²)`);
                    } else if (total > cfg.IMPACT_CANCEL_THRESHOLD && state.silenceSamples < 3) state.phase = 'idle';
                }
            },

            sim: (type) => {
                if(!core.active) return ui.toast(app.lang==='ar'?"فعل النظام أولا":"Activate System First");
                if(type === 'voice') triageManager.start(app.lang==='ar'?"مساعدة":"Help");
                else if(type === 'fall') core.triggerAlarm(app.lang==='ar'?"سقوط وسكون (تجربة)":"Fall & Stillness");
                else if(type === 'scream') core.triggerAlarm(app.lang==='ar'?"صراخ (تجربة)":"Scream Test");
            },

            speakText: (txt, onEndCallback) => {
                window.speechSynthesis.cancel(); 
                const msg = new SpeechSynthesisUtterance(txt);
                msg.lang = app.lang === 'ar' ? 'ar-SA' : 'en-US';
                msg.volume = 1; msg.rate = app.lang === 'ar' ? 1.25 : 1.1; msg.pitch = 1.05;
                if(onEndCallback) { msg.onend = onEndCallback; msg.onerror = onEndCallback; }
                window.speechSynthesis.speak(msg);
            },

            triggerAlarm: async (reason) => {
                if(document.getElementById('doctor-screen').classList.contains('active')) return;
                core.active = false; core.isRecordingResponse = true; core.patientResponse = "";
                document.getElementById('val-status').innerText = CONFIG.TEXT[app.lang].danger;
                document.getElementById('val-status').style.color = "var(--accent)";
                app.showScreen('doctor-screen');
                document.getElementById('txt-alert-header').innerText = `🚨 ${reason} 🚨`;
                document.getElementById('ai-container').style.display = 'none';
                document.getElementById('question-area').style.display = 'block';
                document.getElementById('txt-assurance').style.display = 'none';
                const countEl = document.getElementById('countdown-display');
                countEl.style.display = 'none'; document.getElementById('txt-listening').style.display = 'none';
                core.aiIsSpeaking = true;

                core.speakText(CONFIG.TEXT[app.lang].ai_ask, () => {
                    if(!document.getElementById('doctor-screen').classList.contains('active')) return;
                    core.aiIsSpeaking = false; 
                    document.getElementById('txt-listening').style.display = 'block';
                    let c = 10; countEl.innerText = c; countEl.style.display = 'flex';
                    core.countdownTimer = setInterval(() => {
                        c--; countEl.innerText = c;
                        if(c <= 0) { clearInterval(core.countdownTimer); countEl.style.display = 'none'; document.getElementById('txt-listening').style.display = 'none'; ui.toast(CONFIG.TEXT[app.lang].connecting); core.dispatchAlert(reason); }
                    }, 1000);
                });
                if(navigator.vibrate) navigator.vibrate([500, 200, 500]);
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('🚨 MIMO ALERT', { body: reason, requireInteraction: true, vibrate: [500, 200, 500] });
                }
            },

            dispatchAlert: async (reason) => {
                let locationData = "GPS Unavailable";
                if (navigator.geolocation) {
                    try {
                        const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }));
                        locationData = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    } catch(e) {}
                }

                const alertPayload = {
                    alert: reason, user: app.user, email: app.targetEmail, lang: app.lang, location: locationData,
                    ai_summary: core.patientResponse.length > 2 ? `Patient Response: "${core.patientResponse}"` : "⚠️ NO RESPONSE (Possible Unconsciousness)",
                    fall_data: core.fallState.maxImpact > 0 ? { max_impact: core.fallState.maxImpact, impact_g: (core.fallState.maxImpact / 9.8).toFixed(2) } : null,
                    audio_level: core.audioLevel, gyro_data: core.gyroData,
                    battery: batteryManager.battery ? batteryManager.battery.level : null,
                    network: networkManager.connectionType, timestamp: new Date().toISOString()
                };

                // Strategy 1: Webhook
                let sentViaInternet = false;
                if (networkManager.isOnline) {
                    try {
                        await fetch(CONFIG.WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(alertPayload) });
                        sentViaInternet = true; ui.toast(CONFIG.TEXT[app.lang].sent);
                    } catch(e) {}
                }

                // Strategy 2: Bluetooth Mesh Broadcast (لجميع الأجهزة المتصلة)
                let meshSent = 0;
                if (meshManager.connectedDevices.length > 0) {
                    meshSent = await meshManager.broadcastAlert(alertPayload);
                    if (meshSent > 0) ui.toast((app.lang === 'ar' ? '✅ بث لـ ' : '✅ Broadcast to ') + meshSent + ' devices');
                }

                // Strategy 3: Store locally
                if (!sentViaInternet && meshSent === 0) {
                    await dbManager.saveAlert(alertPayload);
                    ui.toast(app.lang === 'ar' ? '💾 تم الحفظ محلياً' : '💾 Saved locally');
                    if (swManager.registration && 'sync' in swManager.registration) await swManager.registration.sync.register('send-alert');
                }

                if(navigator.vibrate) navigator.vibrate([200]);
                core.provideFirstAid();
            },

            provideFirstAid: () => {
                core.isRecordingResponse = false; 
                document.getElementById('question-area').style.display = 'none';
                const assuranceDiv = document.getElementById('txt-assurance');
                assuranceDiv.style.display = 'block';
                core.aiIsSpeaking = true;
                core.speakText(CONFIG.TEXT[app.lang].assurance_speak, () => { core.aiIsSpeaking = false; });
                setTimeout(() => { document.getElementById('ai-container').style.display = 'block'; }, 2000); 
            },

            cancelAlarm: () => {
                window.speechSynthesis.cancel();
                clearInterval(core.countdownTimer);
                app.showScreen('app-container');
                document.querySelectorAll('.data-item').forEach(e => e.classList.remove('warning-border'));
                core.fallState = { phase: 'idle', timestamp: 0, silenceSamples: 0, maxImpact: 0, history: [] };
                core.isRecordingResponse = false; core.aiIsSpeaking = false; 
                document.getElementById('val-status').innerText = CONFIG.TEXT[app.lang].secure;
                document.getElementById('val-status').style.color = "var(--green)";
                document.querySelector('.widget-area').style.display = 'none';
                document.getElementById('txt-assurance').style.display = 'none';
                document.getElementById('question-area').style.display = 'block';
                core.start();
            }
        };

        // ==================== UI ====================
        const ui = {
            toast: (msg) => { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 3000); },
            btnUpdate: (active) => {
                const btn = document.getElementById('btn-toggle');
                const t = CONFIG.TEXT[app.lang];
                if(active) { btn.classList.add('active'); btn.innerHTML = `<i class="fas fa-shield-alt"></i> <span>${t.active_btn}</span>`; }
                else { btn.classList.remove('active'); btn.innerHTML = `<i class="fas fa-power-off"></i> <span>${t.start_btn}</span>`; }
            }
        };

        window.onload = () => { setTimeout(() => { document.getElementById('splash').style.opacity = 0; setTimeout(()=>app.showScreen('lang-screen'), 400); }, 2000); };
    </script>
</body>
</html>
