<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMO Dispatch 3D - New Valley</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 0; background: #050505; color: #fff; font-family: sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .maplibregl-control-container { display: none !important; } 
        
        .overlay { position: absolute; z-index: 10; pointer-events: none; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .header-panel { background: rgba(10, 10, 10, 0.85); border: 1px solid #D4AF37; padding: 15px 25px; border-radius: 12px; pointer-events: auto; backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; }
        
        .alert-panel { background: rgba(20, 0, 0, 0.9); border: 2px solid #ff003c; padding: 20px; border-radius: 12px; pointer-events: auto; backdrop-filter: blur(10px); transform: translateY(150%); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 30px rgba(255, 0, 60, 0.5); max-width: 400px; }
        .alert-panel.active { transform: translateY(0); }

        .pulse-marker { width: 35px; height: 35px; background-color: #ff003c; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 25px #ff003c; animation: pulse 1s infinite; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; }
        @keyframes pulse { 0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(255, 0, 60, 0.8); } 70% { transform: scale(1.3); box-shadow: 0 0 0 25px rgba(255, 0, 60, 0); } 100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(255, 0, 60, 0); } }
        
        /* زرار الريسيت السري للاختبارات */
        .reset-btn { position: absolute; bottom: 10px; right: 10px; z-index: 9999; background: #333; color: #888; border: none; padding: 5px 10px; font-size: 10px; border-radius: 5px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .reset-btn:hover { opacity: 1; background: #ff003c; color: white; }
    </style>
</head>
<body>

    <div id="map"></div>

    <button class="reset-btn" onclick="clearTestMemory()">مسح ذاكرة الاختبارات</button>

    <div class="overlay">
        <div class="header-panel">
            <div>
                <h1 class="text-xl font-bold text-[#D4AF37] tracking-wider">MIMO DISPATCH <span class="text-white text-sm">| 3D Operations</span></h1>
                <p class="text-xs text-green-400 mt-1"><i class="fas fa-circle animate-pulse text-[8px]"></i> متصل بشبكة الاستشعار (Mesh Network)</p>
            </div>
            <div class="text-right">
                <div class="text-2xl font-mono" id="clock">00:00:00</div>
                <div id="pending-badge" class="text-xs text-red-500 font-bold hidden mt-1"><i class="fas fa-exclamation-circle"></i> يوجد حالة طوارئ نشطة!</div>
            </div>
        </div>

        <div id="alert-card" class="alert-panel mb-4 self-end">
            <div class="flex items-center gap-3 mb-4 border-b border-red-800 pb-3">
                <i class="fas fa-exclamation-triangle text-3xl text-red-500 animate-pulse"></i>
                <h2 class="text-xl font-bold text-white">إنذار سقوط حرج!</h2>
            </div>
            <div class="space-y-2 text-sm">
                <p><span class="text-gray-400">العامل:</span> <span id="worker-name" class="font-bold text-lg text-white">--</span></p>
                <p><span class="text-gray-400">التشخيص الآلي:</span> <span id="worker-status" class="font-bold text-[#D4AF37]">--</span></p>
                <p><span class="text-gray-400">الإحداثيات:</span> <span id="worker-coords" class="font-mono text-xs">--</span></p>
            </div>
            <button onclick="dispatchAmbulance()" class="w-full mt-5 bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded transition shadow-lg shadow-red-900/50">
                <i class="fas fa-check-circle"></i> توجيه الفريق وإنهاء الحالة
            </button>
        </div>
    </div>

    <script>
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', {hour12: false}), 1000);

        const MAPTILER_KEY = 'oO3lRfVkK6Q7CvFToTuW'; 
        
        const map = new maplibregl.Map({
            container: 'map',
            style: `https://api.maptiler.com/maps/hybrid/style.json?key=${MAPTILER_KEY}`,
            center: [30.5511, 25.4321], 
            zoom: 6, 
            pitch: 0,
            antialias: true
        });

        map.on('load', () => {
            map.addSource('terrain-source', {
                type: 'raster-dem',
                url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${MAPTILER_KEY}`,
                tileSize: 256
            });
            map.setTerrain({ source: 'terrain-source', exaggeration: 2.0 }); 
        });

        let currentMarker = null;
        let activeAlertTimestamp = null; 

        // دالة الزر السري لمسح الذاكرة
        function clearTestMemory() {
            localStorage.removeItem('mimo_resolved_alerts');
            alert("تم مسح ذاكرة الحالات السابقة بنجاح. الخريطة جاهزة لاستقبال أي إنذار الآن.");
            location.reload();
        }

        function resetDashboard() {
            document.getElementById('alert-card').classList.remove('active');
            document.getElementById('pending-badge').classList.add('hidden');
            if (currentMarker) currentMarker.remove();
            map.flyTo({ zoom: 6, pitch: 0, bearing: 0, speed: 0.8 }); 
            activeAlertTimestamp = null;
        }

        function triggerMapAlert(lat, lng, name, status, timestamp) {
            document.getElementById('worker-name').innerText = name;
            document.getElementById('worker-status').innerText = status;
            document.getElementById('worker-coords').innerText = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            
            document.getElementById('alert-card').classList.add('active');
            document.getElementById('pending-badge').classList.remove('hidden');

            if (currentMarker) currentMarker.remove();

            const el = document.createElement('div');
            el.className = 'pulse-marker';
            el.innerHTML = '<i class="fas fa-crosshairs"></i>';

            currentMarker = new maplibregl.Marker({ element: el })
                .setLngLat([lng, lat])
                .addTo(map);

            map.flyTo({
                center: [lng, lat],
                zoom: 16.5,
                pitch: 65, 
                bearing: 30, 
                speed: 1.2,
                curve: 1.5,
                essential: true
            });
            
            try { new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play(); } catch(e){}
        }

        function dispatchAmbulance() {
            if (activeAlertTimestamp) {
                let resolvedAlerts = JSON.parse(localStorage.getItem('mimo_resolved_alerts') || '[]');
                resolvedAlerts.push(activeAlertTimestamp);
                localStorage.setItem('mimo_resolved_alerts', JSON.stringify(resolvedAlerts));
            }
            
            alert("تم إرسال إحداثيات الـ 3D لسيارة الإسعاف، وتم إغلاق البلاغ بنجاح.");
            resetDashboard();
        }

        // ==========================================
        // الربط الفعلي مع JSONBin 
        // ==========================================
        
        // السر كله هنا (تمت إضافة /latest في آخر الرابط)
        const JSONBIN_URL = "https://api.jsonbin.io/v3/b/6a283991da38895dfea15041/latest"; 
        const JSONBIN_KEY = "$2a$10$2w5jniqPgIpAcy/JGvEuneWNnvQdK65xfJiwg3dmKl.1Zx20oJ2zK"; 

        async function checkForEmergencies() {
            try {
                const fetchUrl = JSONBIN_URL + "?meta=false&t=" + new Date().getTime();

                const response = await fetch(fetchUrl, { 
                    headers: { 'X-Master-Key': JSONBIN_KEY },
                    cache: 'no-store' 
                });
                
                const data = await response.json();
                
                const record = data.record ? data.record : data;

                if (record && record.timestamp) {
                    let resolvedAlerts = JSON.parse(localStorage.getItem('mimo_resolved_alerts') || '[]');

                    if (!resolvedAlerts.includes(record.timestamp)) {
                        if (activeAlertTimestamp === null) {
                            activeAlertTimestamp = record.timestamp; 
                            
                            const locString = record.location;
                            const coordsMatch = locString ? locString.match(/q=([\d.-]+),([\d.-]+)/) : null;
                            
                            const lat = coordsMatch ? parseFloat(coordsMatch[1]) : 25.4321;
                            const lng = coordsMatch ? parseFloat(coordsMatch[2]) : 30.5511;
                            
                            triggerMapAlert(lat, lng, record.user || 'محمد عبد اللاه', record.ai_summary || 'سقوط حرج', record.timestamp);
                        }
                    }
                }
            } catch (error) {
                console.error("Error checking JSONBin:", error);
            }
        }

        setInterval(checkForEmergencies, 3000);
    </script>
</body>
</html>
